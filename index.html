<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elisa Cuesta Fernández</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles/main.css">
<link rel="stylesheet" href="./styles/gallery.css">
</head>
<body>

<nav class="site-nav">
  <a class="nav-name" href="#">Elisa Cuesta Fernández</a>
  <ul class="nav-links">
    <li><a href="#" class="active">Works</a></li>
    <li><a href="library.html">Library</a></li>
    <li><a href="bio.html">Bio</a></li>
    <li><a href="bio.html#contact">Contact</a></li>
  </ul>
</nav>

<div class="controls">
  <div class="filter-group">
    <span class="filter-label">Research line</span>
    <span class="tag active" onclick="setFilter('all',this)">All</span>
    <span class="tag" onclick="setFilter('liquid',this)"><span class="line-dot" style="background:#a8b8c8"></span>Liquid &amp; porous</span>
    <span class="tag" onclick="setFilter('diagrams',this)"><span class="line-dot" style="background:#c0b0c8"></span>Operative diagrams</span>
    <span class="tag" onclick="setFilter('interfaces',this)"><span class="line-dot" style="background:#a8c4b0"></span>Embodied interfaces</span>
    <span class="tag" onclick="setFilter('making',this)"><span class="line-dot" style="background:#c8b8a0"></span>Making w/ others</span>
  </div>
  <div class="filter-group" id="format-filters">
    <span class="filter-label">Format</span>
    <!-- generado por JS desde allFormats -->
  </div>
  <div class="view-toggle">
    <button class="vbtn" onclick="setView('table',this)">List</button>
    <button class="vbtn active" onclick="setView('gallery',this)">Gallery</button>
    <button class="vbtn" onclick="setView('constellation',this)">Constellation</button>
  </div>
</div>

<!-- LIST VIEW -->
<div id="view-table" style="display:none">
  <table>
    <thead>
      <tr>
        <th>Title</th>
        <th>Year</th>
        <th>Format</th>
        <th>Research line</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>
</div>

<!-- GALLERY VIEW -->
<div id="view-gallery" style="display:block">
  <div class="gallery-grid" id="gallery-grid"></div>
</div>

<!-- CONSTELLATION VIEW -->
<div id="view-constellation" style="display:none">
  <svg id="constellation-svg" viewBox="0 0 900 580"></svg>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="./script.js"></script>
</body>
</html>
